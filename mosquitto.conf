# =================================================================
# Mosquitto Broker Configuration for Smart Pharmacy local testing
# =================================================================

# Port to listen on (1883 is standard unencrypted MQTT)
# 0.0.0.0 binds to all network interfaces so ESP32 can connect
listener 1883 0.0.0.0

# Allow anonymous (no username/password) connections 
allow_anonymous true

# Enable detailed logging to console for easy debugging
log_type error
log_type warning
log_type notice
log_type information
